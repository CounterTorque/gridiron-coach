<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Chalkboard green background -->
  <rect width="32" height="32" rx="4" fill="#1c4820"/>

  <!-- O (defender) — upper right -->
  <circle cx="21" cy="12" r="5.5" fill="none" stroke="white" stroke-width="2.5"/>

  <!-- X (ball carrier) — lower left -->
  <line x1="6" y1="21" x2="13" y2="28" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="13" y1="21" x2="6" y2="28" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Route: dashes from X, sweeping around left of O, ending past O -->
  <path d="M 9.5,20 C 9.5,9 4,3 14,3.5 Q 26,4 27,12"
        fill="none" stroke="white" stroke-width="1.8"
        stroke-dasharray="2.5,2.2" stroke-linecap="round"/>

  <!-- Arrowhead at route end (27,12), pointing rightward -->
  <polyline points="25,9 27,12 25,15"
            fill="none" stroke="white" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
